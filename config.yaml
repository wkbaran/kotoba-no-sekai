# Kotoba no Sekai — Configuration

# Vocabulary difficulty level to collect.
# Follows JLPT bands:
#   beginner     → N5 / N4
#   intermediate → N3
#   advanced     → N2 / N1
#   all          → no level filter (includes words with no JLPT tag)
level: beginner

# Maximum number of new words to collect per run.
max_words_per_run: 4

# Maximum number of example sentences to attach to each word.
# If fewer are found in the source article, the word is still included.
max_examples_per_word: 2

# Minimum length (in characters) for a candidate word's surface form.
# Filters out single-character noise like particles that slip through POS filtering.
min_word_length: 2

# Delay between Jisho API calls in milliseconds. Be courteous to the free API.
jisho_delay_ms: 600

# Output directories (relative to working directory, or absolute).
output:
  json: output/data
  html: output/web
  markdown: output/web

# SQLite database path for deduplication tracking.
database:
  path: output/kotoba.db

# Text-to-speech configuration.
# API keys are read from environment variables: OPENAI_API_KEY, ELEVENLABS_API_KEY
#
# provider: auto        → ElevenLabs if key set, else OpenAI if key set, else browser
#           openai      → OpenAI TTS (requires OPENAI_API_KEY)
#           elevenlabs  → ElevenLabs TTS (requires ELEVENLABS_API_KEY)
#           browser     → Web Speech API only, no files generated
#           disabled    → no audio
tts:
  provider: auto

  openai:
    voice: alloy      # alloy | echo | fable | onyx | nova | shimmer
    model: tts-1      # tts-1 | tts-1-hd (higher quality, slower)

  elevenlabs:
    # "Lily" — ElevenLabs multilingual v2, good Japanese pronunciation
    # Find voice IDs at: https://elevenlabs.io/voice-library
    voice_id: pFZP5JQG7iQjIQuC4Bku
    model_id: eleven_multilingual_v2

# Translation configuration.
# Google API key read from GOOGLE_API_KEY env var.
#
# provider: auto     → Ollama if reachable, else Google if key set, else disabled
#           ollama   → local Ollama instance (no API key needed)
#           google   → Google Cloud Translation API (requires GOOGLE_API_KEY)
#           disabled → no translation
translation:
  provider: auto

  ollama:
    url: http://localhost:11434
    # Any model with good multilingual support works.
    # translategemma:12b is purpose-built for translation.
    # Other good options: qwen2.5:3b, gemma3:4b, llama3.2:3b
    model: translategemma:12b
