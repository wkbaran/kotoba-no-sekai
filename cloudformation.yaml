AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Kotoba no Sekai — static website hosting.
  S3 bucket (private) + CloudFront (HTTPS) + IAM publish user.
  IMPORTANT: Deploy this stack in us-east-1. ACM certificates used by
  CloudFront must live in us-east-1 regardless of where your bucket is.

Parameters:

  BucketName:
    Type: String
    Description: S3 bucket name (must be globally unique, e.g. kotoba-billbaran)

  CustomDomain:
    Type: String
    Default: ''
    Description: >
      Optional. Custom domain to serve from, e.g. kotoba.billbaran.us.
      Leave blank to use the auto-assigned https://<id>.cloudfront.net URL.

  HostedZoneId:
    Type: String
    Default: ''
    Description: >
      Route 53 Hosted Zone ID for CustomDomain (required when CustomDomain is set).
      Find it in the Route 53 console — it looks like Z1PA6795UKMFR9.

Conditions:
  HasCustomDomain: !Not [!Equals [!Ref CustomDomain, '']]

Resources:

  # ── S3 bucket (private — served only through CloudFront) ─────────────────

  Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      # No public access — CloudFront OAC handles all reads
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # ── CloudFront Origin Access Control ─────────────────────────────────────

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${BucketName}-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  # Bucket policy: allow CloudFront (any distribution in this account) to read
  # Note: using a wildcard on distribution ID to avoid a circular dependency
  # between BucketPolicy ↔ Distribution. Restricts to this AWS account only.
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${Bucket.Arn}/*'
            Condition:
              StringLike:
                AWS:SourceArn: !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/*'

  # ── ACM Certificate (only when a custom domain is provided) ──────────────

  Certificate:
    Type: AWS::CertificateManager::Certificate
    Condition: HasCustomDomain
    Properties:
      DomainName: !Ref CustomDomain
      ValidationMethod: DNS
      # CloudFormation will automatically add the validation CNAME to Route 53
      DomainValidationOptions:
        - DomainName: !Ref CustomDomain
          HostedZoneId: !Ref HostedZoneId

  # ── CloudFront Distribution ───────────────────────────────────────────────

  Distribution:
    Type: AWS::CloudFront::Distribution
    DependsOn: BucketPolicy
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        HttpVersion: http2
        PriceClass: PriceClass_100   # US/Europe/Asia — cheapest tier

        Origins:
          - Id: S3Origin
            DomainName: !GetAtt Bucket.RegionalDomainName
            S3OriginConfig:
              OriginAccessIdentity: ''   # required but empty when using OAC
            OriginAccessControlId: !Ref OAC

        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          # AWS managed CachingOptimized policy — caches aggressively, good for static files
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          AllowedMethods: [GET, HEAD]
          Compress: true

        # Map S3 403 (object not found in private bucket) → HTTP 404
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 404
            ResponsePagePath: /index.html
            ErrorCachingMinTTL: 10

        # Custom domain + certificate (conditional)
        Aliases: !If
          - HasCustomDomain
          - [!Ref CustomDomain]
          - !Ref AWS::NoValue
        ViewerCertificate: !If
          - HasCustomDomain
          - AcmCertificateArn: !Ref Certificate
            SslSupportMethod: sni-only
            MinimumProtocolVersion: TLSv1.2_2021
          - CloudFrontDefaultCertificate: true

  # ── Route 53 alias record (only when a custom domain is provided) ─────────

  DnsRecord:
    Type: AWS::Route53::RecordSet
    Condition: HasCustomDomain
    Properties:
      HostedZoneId: !Ref HostedZoneId
      Name: !Ref CustomDomain
      Type: A
      AliasTarget:
        # Z2FDTNDATAQYW2 is the fixed hosted zone ID for all CloudFront distributions
        HostedZoneId: Z2FDTNDATAQYW2
        DNSName: !GetAtt Distribution.DomainName
        EvaluateTargetHealth: false

  # ── IAM user for the --publish command ───────────────────────────────────

  PublishUser:
    Type: AWS::IAM::User
    Properties:
      UserName: !Sub 'kotoba-publisher-${BucketName}'
      Policies:
        - PolicyName: KotobaPublish
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: s3:ListBucket
                Resource: !GetAtt Bucket.Arn
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub '${Bucket.Arn}/*'

  PublishAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref PublishUser

Outputs:

  SiteUrl:
    Description: Public URL of the site
    Value: !If
      - HasCustomDomain
      - !Sub 'https://${CustomDomain}'
      - !Sub 'https://${Distribution.DomainName}'

  CloudFrontDomain:
    Description: Raw CloudFront domain (always available, even with a custom domain)
    Value: !GetAtt Distribution.DomainName

  BucketName:
    Description: S3 bucket name — use this in config.yaml under publish.s3.bucket
    Value: !Ref Bucket

  Region:
    Description: Region to set in .env as AWS_REGION
    Value: !Ref AWS::Region

  AccessKeyId:
    Description: AWS_ACCESS_KEY_ID — copy to .env
    Value: !Ref PublishAccessKey

  SecretAccessKey:
    Description: AWS_SECRET_ACCESS_KEY — copy to .env (visible here only; store it securely)
    Value: !GetAtt PublishAccessKey.SecretAccessKey
